physics:
  theta: 0.15
  mu: 0.0
  sigma: 0.2
  dt: 0.1
  marginal_variance: 0.2  # marginal variance for all trajectories

theta_sampling:
  distribution: "lognormal"
  mean: 0.0  # Mean of underlying normal: log(θ) ~ N(0, 0.5)
  sigma: 0.0  # Std of underlying normal

structure:
  num_trajectories: 1000 
  sequence_length: 100  # Length of each trajectory  


target:
  order: 3  # Number of s values in the grid

training:
  train_split: 0.8
  batch_size: 64

paths:
  mgf_data_path: "data/ou_mgf.pt"
